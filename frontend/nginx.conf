server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Make sure the zk circuit artifacts are served with correct types
    # and are large-file friendly (zkey files can be several MB).
    types {
        application/wasm wasm;
        application/octet-stream zkey;
    }

    location /circuits/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache hashed static assets aggressively
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback: let React Router / Vite handle client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/wasm;
    gzip_min_length 1024;
}